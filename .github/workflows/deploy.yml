name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

# Only runs after CI passes on main
jobs:
  deploy:
    name: Push to HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git identity
        run: |
          git config user.email "ci@immuniwatch-ng.org"
          git config user.name "ImmuniWatch CI"

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Set HF_SPACE_REPO in GitHub repo Settings → Secrets → Actions
          # Format: YourHFUsername/your-space-name
          # Example: AHFIDAILabs/immuniwatch-ml-service
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          git remote add hf "https://AHFIDAILabs:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}"
          git push hf main --force
